version: v1
name: "openclaw-manager"
target: "openclaw-manager:latest"

sources:
  app: "openclaw-manager-app:latest"

api:
  listen_port: 18000

ingress:
  - listen_port: 8000

egress:
  allow:
    - "**"
    - "0.0.0.0/0"
    - "::/0"

kms_integration:
  enabled: false

storage:
  mounts:
    - name: "openclaw"
      mount_path: "/mnt/openclaw"
      required: true
      size_mb: 10240

defaults:
  cpu_count: 2
  memory_mb: 12288
